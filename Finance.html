<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Dashboard</title>
<style>
body{font-family:Arial,sans-serif;background:#08111f;color:#fff;margin:0;padding:20px}
h1{color:#c9a84c}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.card{background:#111d35;padding:15px;border-radius:10px}
.card b{font-size:28px;color:#c9a84c}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}
input,button{padding:10px}
table{width:100%;border-collapse:collapse;background:#111d35}
th,td{padding:8px;border:1px solid #223}
.approve{background:#2ecc71}
.reject{background:#e74c3c;color:#fff}
</style>
</head>
<body>

<h1>Finance Dashboard</h1>

<div class="grid">
<div class="card">Total Books<br><b id="books">0</b></div>
<div class="card">Total Bookings<br><b id="bookings">0</b></div>
<div class="card">Approved<br><b id="approved">0</b></div>
<div class="card">Pending<br><b id="pending">0</b></div>
<div class="card">Paid<br><b id="paid">0</b></div>
<div class="card">Revenue<br><b id="revenue">0</b></div>
<div class="card">Positions Filled<br><b id="positions">0</b></div>
</div>

<div class="toolbar">
<input id="search" placeholder="Search">
<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportCSV()">Export CSV</button>
<input type="file" id="importFile">
<button onclick="importJSON()">Import JSON</button>
</div>

<table>
<thead>
<tr>
<th>Book ID</th>
<th>Type</th>
<th>Title</th>
<th>Author</th>
<th>Position</th>
<th>Booking Date</th>
<th>Payment Date</th>
<th>Amount</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let records=JSON.parse(localStorage.getItem("bookind_records"))||[];

function stats(){
let books=records.length, bookings=0, approved=0, pending=0, paid=0, revenue=0, positions=0;

records.forEach(r=>{
(r.rows||[]).forEach(x=>{
const valid=x.author && x.author.trim()!=="" && x.bookingDate && x.bookingDate.trim()!=="";
if(!valid) return;

bookings++;
if(x.position) positions++;

if((x.status||"Pending")==="Approved") approved++;
else pending++;

if(x.paymentDate && String(x.paymentDate).trim()!==""){
paid++;
revenue += Number(x.amount||0);
}
});
});

document.getElementById("books").textContent=books;
document.getElementById("bookings").textContent=bookings;
document.getElementById("approved").textContent=approved;
document.getElementById("pending").textContent=pending;
document.getElementById("paid").textContent=paid;
document.getElementById("revenue").textContent=revenue.toFixed(2);
document.getElementById("positions").textContent=positions;
}

function render(){
let q=(document.getElementById("search").value||"").toLowerCase();
let h="";

records.forEach((r,ri)=>{
(r.rows||[]).forEach((x,xi)=>{

const valid=x.author && x.author.trim()!=="" && x.bookingDate && x.bookingDate.trim()!=="";
if(!valid) return;

let txt=(r.bookId+r.title+(x.author||"")+(x.position||"")).toLowerCase();
if(!txt.includes(q)) return;

h+=`<tr>
<td>${r.bookId||''}</td>
<td>${r.type||''}</td>
<td contenteditable onblur="upd(${ri},'title',this.innerText)">${r.title||''}</td>
<td contenteditable onblur="updRow(${ri},${xi},'author',this.innerText)">${x.author||''}</td>
<td contenteditable onblur="updRow(${ri},${xi},'position',this.innerText)">${x.position||''}</td>
<td>${x.bookingDate||''}</td>
<td>${x.paymentDate||''}</td>
<td contenteditable onblur="updRow(${ri},${xi},'amount',this.innerText)">${x.amount||''}</td>
<td>${x.status||'Pending'}</td>
<td>
<button class="approve" onclick="setStatus(${ri},${xi},'Approved')">Approve</button>
<button class="reject" onclick="setStatus(${ri},${xi},'Rejected')">Reject</button>
</td>
</tr>`;
});
});

document.getElementById("tbody").innerHTML=h;
stats();
}

function upd(i,f,v){records[i][f]=v;save();}
function updRow(i,j,f,v){records[i].rows[j][f]=v;save();}
function setStatus(i,j,s){records[i].rows[j].status=s;save();}

function save(){
localStorage.setItem("bookind_records",JSON.stringify(records));
render();
}

function exportJSON(){
let blob=new Blob([JSON.stringify(records,null,2)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="finance_records.json";
a.click();
}

function exportCSV(){
let csv="BookID,Type,Title,Author,Position,BookingDate,PaymentDate,Amount,Status\n";
records.forEach(r=>{
(r.rows||[]).forEach(x=>{
if(!(x.author&&x.bookingDate)) return;
csv+=`${r.bookId||''},${r.type||''},${r.title||''},${x.author||''},${x.position||''},${x.bookingDate||''},${x.paymentDate||''},${x.amount||''},${x.status||'Pending'}\n`;
});
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="finance_records.csv";
a.click();
}

function importJSON(){
let f=document.getElementById("importFile").files[0];
if(!f) return;

let reader=new FileReader();
reader.onload=function(e){
records=JSON.parse(e.target.result);
save();
};
reader.readAsText(f);
}

document.getElementById("search").addEventListener("keyup",render);
render();
</script>

</body>
</html>
